<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dikkan PLC Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logod.png', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css', v=asset_version) }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="{{ url_for('static', filename='images/logo.png', v=asset_version) }}" alt="Dikkan">
        <span>PLC Dashboard</span>
      </div>
      <div class="toolbar">
        <span id="generatedAt">-</span>
        <button id="refreshButton" type="button">Yenile</button>
      </div>
    </header>

    <main class="shell">
      <section class="status-grid" aria-label="Ozet">
        <article class="status-card primary">
          <span>Durum</span>
          <strong id="connectionState">-</strong>
          <small id="lastUpdate">-</small>
        </article>
        <article class="status-card">
          <span>Toplam Tag</span>
          <strong id="totalTags">-</strong>
        </article>
        <article class="status-card warning">
          <span>Uyari / Kritik</span>
          <strong id="alarmCount">-</strong>
        </article>
        <article class="status-card">
          <span>Bugun Degisen</span>
          <strong id="changesToday">-</strong>
        </article>
      </section>

      <section class="chart-panel">
        <div class="panel-title">
          <div>
            <h1>Canli Deger Trendi</h1>
            <p>Son degisim kayitlarina gore anlik hareket.</p>
          </div>
          <span id="recentChangeCount">-</span>
        </div>
        <canvas id="trendChart" height="260"></canvas>
      </section>

      <section class="content-grid">
        <section class="panel">
          <div class="panel-title compact">
            <div>
              <h2>Anlik Degerler</h2>
              <p>PLC register ve degisim filtresi</p>
            </div>
            <div class="filter-bar">
              <input id="tagFilter" type="search" placeholder="Tag veya adres ara">
              <div class="filter-tabs" aria-label="Hizli filtreler">
                <button type="button" class="is-active" data-filter="all">Tumu</button>
                <button type="button" data-filter="f1">Firin 1</button>
                <button type="button" data-filter="f2">Firin 2</button>
                <button type="button" data-filter="isi">Isi</button>
                <button type="button" data-filter="critical">Kritik</button>
              </div>
            </div>
          </div>
          <div class="tag-list" id="tagList" aria-live="polite"></div>
        </section>

        <section class="panel">
          <div class="panel-title compact">
            <div>
              <h2>Son Degisimler</h2>
              <p>En yeni 50 hareket</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Adres</th>
                  <th>Tag</th>
                  <th>Onceki</th>
                  <th>Yeni</th>
                  <th>Fark</th>
                  <th>Zaman</th>
                </tr>
              </thead>
              <tbody id="changesTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="errorToast" role="status"></div>
    <script src="{{ url_for('static', filename='dashboard.js', v=asset_version) }}"></script>
  </body>
</html>
